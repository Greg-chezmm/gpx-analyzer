name: Déploiement GitHub Pages

on:
  push:
    branches: [ "main" ]

# Permissions requises pour déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Éviter les déploiements concurrents
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installer les dépendances
        run: npm install

      - name: Compiler le projet
        run: npm run build

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v4

      - name: Téléverser l'artefact de build
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
